<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Irreducible Supports</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.5;
    }
    h1 { margin-bottom: 0; }
    .sub { color: #555; margin-top: 6px; }
    input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin: 20px 0;
      box-sizing: border-box;
    }
    pre {
      background: #f6f6f6;
      padding: 16px;
      border-radius: 10px;
      overflow-x: auto;
      white-space: pre-wrap;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Irreducible Supports</h1>
  <p class="sub">Output generated by the C++/FLINT support checker.</p>
  <p><a href="out.txt">Download raw out.txt</a></p>

  <input id="search" placeholder="Search supports, e.g. 20 10 0">

  <pre id="output">Loading...</pre>

  <script>
    let lines = [];
    fetch("out.txt")
      .then(r => r.text())
      .then(t => {
        lines = t.trim().split("\n");
        render(lines);
      });

    function render(arr) {
      document.getElementById("output").textContent = arr.join("\n");
    }

    document.getElementById("search").addEventListener("input", e => {
      const q = e.target.value.trim();
      if (!q) render(lines);
      else render(lines.filter(line => line.includes(q)));
    });
  </script>
</body>
</html>
